# Project-scoped Codex stability settings for long AAPS debugging sessions.
# Keep context compaction earlier and tool outputs smaller so huge logs do not
# grow a thread to hundreds of megabytes before Codex tries to compact it.
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_reasoning_summary = "none"
model_verbosity = "low"
model_auto_compact_token_limit = 64000
tool_output_token_limit = 4000
